<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geomers Academy | Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --teal: #14B89D;
      --teal-dark: #0e9a84;
      --teal-light: #d0f5ef;
      --teal-xlight: #e8faf7;
      --lemon: #F9D857;
      --lemon-light: #fef8d5;
      --white: #ffffff;
      --dark: #2D3E50;
      --mid: #5a7080;
      --line: #dfe8e5;
      --shadow: 0 18px 50px rgba(20,184,157,0.14), 0 8px 22px rgba(45,62,80,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      color: var(--dark);
      background:
        radial-gradient(circle at top left, rgba(20,184,157,0.18), transparent 31%),
        radial-gradient(circle at bottom right, rgba(249,216,87,0.34), transparent 31%),
        linear-gradient(135deg, var(--teal-xlight), #fff 48%, var(--lemon-light));
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    .page {
      flex: 1;
      width: 100%;
      max-width: 1180px;
      margin: 0 auto;
      padding: 54px 28px 24px;
      display: grid;
      grid-template-columns: 1.02fr 530px;
      align-items: center;
      gap: 54px;

      /* 🔥 SCALE 30% */
      transform: scale(0.7);
      transform-origin: top center;
    }

    .phone-wrap {
      position: relative;
      min-height: 650px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .blob {
      position: absolute;
      width: 470px;
      height: 470px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(20,184,157,0.22), rgba(20,184,157,0.10));
      z-index: 0;
    }

    .yellow-blob {
      position: absolute;
      width: 300px;
      height: 300px;
      left: 10px;
      bottom: 25px;
      border-radius: 50%;
      background: rgba(249,216,87,0.24);
      z-index: 0;
    }

    .dots {
      position: absolute;
      left: 0;
      top: 290px;
      width: 120px;
      height: 90px;
      background-image: radial-gradient(rgba(20,184,157,0.55) 2px, transparent 2px);
      background-size: 18px 18px;
      z-index: 1;
    }

    .phone {
      position: relative;
      z-index: 2;
      width: 335px;
      height: 640px;
      border-radius: 40px;
      padding: 14px;
      background: #172331;
      box-shadow: 0 28px 60px rgba(45,62,80,0.26);
      transform: rotate(-7deg);
      border: 4px solid rgba(255,255,255,0.92);
    }

    .screen {
      width: 100%;
      height: 100%;
      border-radius: 30px;
      overflow: hidden;
      background: #fff;
    }

    .login-card {
      width: 100%;
      background: rgba(255,255,255,0.86);
      border: 1px solid rgba(20,184,157,0.18);
      border-radius: 24px;
      padding: 58px 42px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .brand { text-align: center; margin-bottom: 34px; }

    .brand-mark {
      width: 82px;
      height: 82px;
      margin: 0 auto 24px;
      border-radius: 22px;
      background: linear-gradient(135deg, var(--teal), var(--teal-dark));
      display: grid;
      place-items: center;
      color: white;
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 2rem;
    }

    .brand h1 {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      color: var(--dark);
      font-size: 2.55rem;
    }

    .form-group { margin-bottom: 18px; }

    .form-group input {
      width: 100%;
      height: 68px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 0 20px;
      font-size: 1rem;
    }

    .login-btn {
      width: 100%;
      height: 64px;
      margin-top: 12px;
      border: 0;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--teal), var(--teal-dark));
      color: white;
      font-weight: 800;
      font-size: 1.08rem;
      cursor: pointer;
    }

    .footer {
      padding: 20px;
      text-align: center;
      color: var(--mid);
    }

    @media (max-width: 1050px) {
      .page {
        grid-template-columns: 1fr;
        transform: scale(0.85); /* biar mobile tetap nyaman */
      }
      .phone-wrap { display: none; }
    }

  </style>
</head>

<body>

  <main class="page">

    <section class="phone-wrap">
      <div class="blob"></div>
      <div class="yellow-blob"></div>
      <div class="dots"></div>

      <div class="phone">
        <div class="screen"></div>
      </div>
    </section>

    <section class="login-card">
      <div class="brand">
        <div class="brand-mark">G</div>
        <h1>Geomers Academy</h1>
      </div>

      <form>
        <div class="form-group">
          <input type="text" placeholder="Username / Email">
        </div>

        <div class="form-group">
          <input type="password" placeholder="Password">
        </div>

        <button class="login-btn">Masuk</button>
      </form>

    </section>

  </main>

  <footer class="footer">
    © 2026 Geomers Academy
  </footer>

</body>
</html>
