<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geomers Academy | Redirect</title>
  <style>
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      font-family: Arial, sans-serif; color: #2D3E50;
      background: linear-gradient(135deg, #e8faf7, #fff, #fef8d5);
    }
    .box { text-align: center; padding: 24px; }
  </style>
</head>
<body>
  <div class="box">
    <h2>Geomers Academy</h2>
    <p>Mengarahkan akun Anda...</p>
  </div>

  <script type="module">
  import { auth } from './firebase-config.js';
  
  // Cek apakah user masih login di Firebase
  auth.onAuthStateChanged(async (user) => {
    if (!user) {
      // Tidak login
      window.location.replace('login.html');
      return;
    }
    
    // Ambil role dari custom claims
    try {
      const idTokenResult = await user.getIdTokenResult();
      const role = idTokenResult.claims.role;
      
      if (role === 'kebumian') {
        window.location.replace('kebumian/index.html');
      } else if (role === 'geografi') {
        window.location.replace('geografi/index.html');
      } else {
        // Role tidak dikenal, logout
        await auth.signOut();
        localStorage.clear();
        window.location.replace('login.html');
      }
    } catch (error) {
      console.error('Error:', error);
      window.location.replace('login.html');
    }
  });
</script>
</body>
</html>
