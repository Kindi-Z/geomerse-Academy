<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geomers Academy | Redirect</title>
  <style>
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      font-family: Arial, sans-serif; color: #2D3E50;
      background: linear-gradient(135deg, #e8faf7, #fff, #fef8d5);
    }
    .box { text-align: center; padding: 24px; }
  </style>
</head>
<body>
  <div class="box">
    <h2>Geomers Academy</h2>
    <p>Mengarahkan akun Anda...</p>
  </div>

  <script>
    const loggedIn = localStorage.getItem('geomersLoggedIn');
    const role = localStorage.getItem('geomersRole');

    if (loggedIn !== 'true') {
      window.location.replace('login.html');
    } else if (role === 'kebumian') {
      window.location.replace('kebumian/index.html');
    } else if (role === 'geografi') {
      window.location.replace('geografi/index.html');
    } else {
      localStorage.clear();
      window.location.replace('login.html');
    }
  </script>
</body>
</html>
