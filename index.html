<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geomers Academy | Redirect</title>
  <style>
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      font-family: Arial, sans-serif; color: #2D3E50;
      background: linear-gradient(135deg, #e8faf7, #fff, #fef8d5);
    }
    .box { text-align: center; padding: 24px; }
  </style>
</head>
<body>
  <div class="box">
    <h2>Geomers Academy</h2>
    <p>Mengarahkan akun Anda...</p>
  </div>

  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
  import { getAuth } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCxwyTe5FylqJZcPO8TA7Va_xCRbMzJyWk",
    authDomain: "geomers-academy-5b9e5.firebaseapp.com",
    projectId: "geomers-academy-5b9e5",
    storageBucket: "geomers-academy-5b9e5.firebasestorage.app",
    messagingSenderId: "598328922866",
    appId: "1:598328922866:web:d2f38f330c53e9d227766b"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  auth.onAuthStateChanged(async (user) => {
    if (!user) {
      window.location.replace('login/');
      return;
    }

    try {
      const idTokenResult = await user.getIdTokenResult();
      const role = idTokenResult.claims.role;

      if (role === 'kebumian') {
        window.location.replace('kebumian/index.html');
      } else if (role === 'geografi') {
        window.location.replace('geografi/index.html');
      } else {
        await auth.signOut();
        localStorage.clear();
        window.location.replace('login/');
      }
    } catch (error) {
      console.error('Error:', error);
      window.location.replace('login/');
    }
  });
</script>
</body>
</html>
