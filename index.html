<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geomers Academy | Redirect</title>
  <style>
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      font-family: Arial, sans-serif; color: #2D3E50;
      background: linear-gradient(135deg, #e8faf7, #fff, #fef8d5);
    }
    .box { text-align: center; padding: 24px; }
  </style>
</head>
<body>
  <div class="box">
    <h2>Geomers Academy</h2>
    <p>Mengarahkan akun Anda...</p>
  </div>

  <script type="module">
  import {
    auth,
    onAuthStateChanged,
    signOut
  } from "./firebase-config.js";

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.replace("login/");
      return;
    }

    try {
      const token = await user.getIdTokenResult(true);
      const role = token.claims.role;

      if (role === "kebumian") {
        window.location.replace("kebumian/");
      } else if (role === "geografi") {
        window.location.replace("geografi/");
      } else {
        await signOut(auth);
        localStorage.clear();
        window.location.replace("login/");
      }
    } catch (error) {
      console.error("Redirect error:", error);
      localStorage.clear();
      window.location.replace("login/");
    }
  });
</script>
</body>
</html>
