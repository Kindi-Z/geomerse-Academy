<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>TryOut Geografi | Geomers Academy</title>

  <style>
    :root {
      --teal: #14B89D;
      --teal-dark: #0D947F;
      --yellow: #FFDB58;
      --dark: #25364A;
      --muted: #64748B;
      --soft: #EAFBF8;
      --border: #C8F2EA;
      --danger: #DC2626;
      --danger-soft: #FEF2F2;
      --success: #059669;
      --success-soft: #ECFDF5;
      --white: #FFFFFF;
      --shadow: 0 16px 42px rgba(37, 54, 74, 0.10);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(20, 184, 157, 0.18), transparent 34%),
        radial-gradient(circle at bottom right, rgba(255, 219, 88, 0.24), transparent 32%),
        linear-gradient(135deg, #F4FFFC, #FFFBEA);
      color: var(--dark);
    }

    .topbar {
      width: 100%;
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(20, 184, 157, 0.18);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar-inner {
      width: min(1100px, calc(100% - 32px));
      margin: 0 auto;
      padding: 14px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
      letter-spacing: 0.3px;
      color: var(--dark);
    }

    .brand-icon {
      width: 36px;
      height: 36px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--teal), var(--teal-dark));
      display: grid;
      place-items: center;
      color: white;
      box-shadow: 0 8px 18px rgba(20, 184, 157, 0.24);
    }

    .nav-link {
      text-decoration: none;
      font-weight: 800;
      font-size: 14px;
      color: var(--teal-dark);
      padding: 10px 14px;
      border-radius: 999px;
      background: var(--soft);
      border: 1px solid var(--border);
    }

    .container {
      width: min(1000px, calc(100% - 32px));
      margin: 34px auto 56px;
    }

    .card {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(20, 184, 157, 0.20);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 30px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--teal-dark);
      font-weight: 900;
      font-size: 13px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.1;
      letter-spacing: -0.7px;
    }

    p {
      color: var(--muted);
      line-height: 1.65;
      margin: 8px 0;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin: 24px 0 10px;
    }

    .info {
      background: #F8FFFD;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
    }

    .info strong {
      display: block;
      font-size: 24px;
      color: var(--teal-dark);
      margin-bottom: 4px;
    }

    .timer-box {
      margin: 20px 0;
      padding: 18px;
      border-radius: 22px;
      background: linear-gradient(135deg, var(--dark), #314A67);
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .timer-label {
      font-size: 14px;
      opacity: 0.86;
      font-weight: 700;
    }

    .timer-value {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 1px;
      font-variant-numeric: tabular-nums;
    }

    .question {
      padding: 22px;
      border: 1px solid rgba(20, 184, 157, 0.22);
      border-radius: 22px;
      background: #FFFFFF;
      margin: 18px 0;
    }

    .question h3 {
      margin: 0 0 14px;
      font-size: 18px;
      line-height: 1.45;
    }

    .option {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 13px 14px;
      border: 1px solid #E2E8F0;
      border-radius: 16px;
      margin: 10px 0;
      cursor: pointer;
      transition: 0.18s ease;
      color: #334155;
      background: #FFFFFF;
    }

    .option:hover {
      border-color: var(--teal);
      background: #F4FFFC;
      transform: translateY(-1px);
    }

    .option input {
      margin-top: 2px;
      accent-color: var(--teal);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }

    button,
    .btn {
      border: none;
      border-radius: 999px;
      padding: 14px 22px;
      font-weight: 900;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 15px;
      transition: 0.18s ease;
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--yellow);
      color: var(--dark);
      box-shadow: 0 10px 20px rgba(255, 219, 88, 0.28);
    }

    .btn-outline {
      background: white;
      color: var(--teal-dark);
      border: 2px solid var(--teal);
    }

    .status {
      padding: 15px 16px;
      border-radius: 18px;
      margin-top: 16px;
      font-weight: 800;
      line-height: 1.5;
    }

    .status.error {
      background: var(--danger-soft);
      color: var(--danger);
      border: 1px solid #FECACA;
    }

    .status.success {
      background: var(--success-soft);
      color: var(--success);
      border: 1px solid #A7F3D0;
    }

    .loading {
      min-height: 260px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      font-weight: 900;
    }

    .score-box {
      margin-top: 20px;
      padding: 24px;
      border-radius: 24px;
      background: linear-gradient(135deg, var(--soft), #FFF8D7);
      border: 1px solid var(--border);
      text-align: center;
    }

    .score-box strong {
      display: block;
      font-size: clamp(42px, 8vw, 72px);
      color: var(--teal-dark);
      line-height: 1;
      margin-bottom: 8px;
    }

    .leaderboard-card {
      margin-top: 26px;
      padding: 20px;
      border-radius: 22px;
      background: #FFFFFF;
      border: 1px solid rgba(20, 184, 157, 0.22);
    }

    .leaderboard-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .leaderboard-title h2 {
      margin: 0;
      font-size: 20px;
    }

    .leaderboard-list {
      display: grid;
      gap: 10px;
    }

    .lb-row {
      display: grid;
      grid-template-columns: 48px 1fr 80px 100px;
      gap: 10px;
      align-items: center;
      padding: 12px 14px;
      border-radius: 16px;
      background: #F8FFFD;
      border: 1px solid #E2E8F0;
      font-size: 14px;
    }

    .lb-row.lb-head {
      background: var(--soft);
      color: var(--teal-dark);
      font-weight: 900;
    }

    .lb-row.me {
      border-color: var(--teal);
      background: #F0FDFA;
    }

    .lb-rank {
      font-weight: 900;
      color: var(--teal-dark);
    }

    .lb-name {
      font-weight: 800;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .lb-score {
      font-weight: 900;
      text-align: right;
    }

    .lb-time {
      color: var(--muted);
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .small-note {
      font-size: 13px;
      color: var(--muted);
      margin-top: 14px;
    }

    @media (max-width: 780px) {
      .topbar-inner {
        width: min(100% - 24px, 1100px);
      }

      .brand {
        font-size: 14px;
      }

      .brand-icon {
        width: 32px;
        height: 32px;
        border-radius: 12px;
      }

      .nav-link {
        padding: 9px 12px;
        font-size: 13px;
      }

      .container {
        width: min(100% - 24px, 1000px);
        margin: 22px auto 42px;
      }

      .card {
        padding: 20px;
        border-radius: 22px;
      }

      .info-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .timer-box {
        align-items: flex-start;
        flex-direction: column;
      }

      .question {
        padding: 17px;
      }

      button,
      .btn {
        width: 100%;
      }

      .lb-row {
        grid-template-columns: 40px 1fr 64px;
      }

      .lb-time {
        display: none;
      }
    }

    @media (max-width: 420px) {
      .info-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="brand-icon">🌏</div>
        <div>GEOMERS TRYOUT GEOGRAFI</div>
      </div>

      <a href="/geografi/" class="nav-link">Kembali</a>
    </div>
  </header>

  <main class="container">
    <section id="app" class="card">
      <div class="loading">Memuat TryOut...</div>
    </section>
  </main>

  <script type="module">
    import { auth, db } from "../../firebase-config.js";

    import {
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

    import {
      doc,
      getDoc,
      updateDoc,
      setDoc,
      runTransaction,
      serverTimestamp,
      collection,
      getDocs
    } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

    const REQUIRED_ROLE = "geografi";
    const TRYOUT_ID = "geografi-to-1";
    const TRYOUT_TITLE = "TryOut Geografi 1";
    const DURATION_SECONDS = 45 * 60;

    const questions = [
      {
        text: "Ilmu yang mempelajari persamaan dan perbedaan fenomena geosfer dalam sudut pandang kewilayahan dan kelingkungan disebut ....",
        options: ["Geologi", "Geografi", "Meteorologi", "Hidrologi"],
        answer: 1
      },
      {
        text: "Konsep geografi yang berkaitan dengan jarak, lokasi, dan akses suatu tempat terhadap tempat lain adalah ....",
        options: ["Morfologi", "Keterjangkauan", "Aglomerasi", "Interaksi"],
        answer: 1
      },
      {
        text: "Peta dengan skala 1:50.000 berarti 1 cm pada peta sama dengan .... di lapangan.",
        options: ["50 meter", "500 meter", "5 kilometer", "50 kilometer"],
        answer: 1
      },
      {
        text: "Fenomena urbanisasi paling tepat dikaji menggunakan pendekatan ....",
        options: ["Keruangan", "Biologis", "Astronomis", "Kimiawi"],
        answer: 0
      },
      {
        text: "Citra satelit dan sistem informasi geografis banyak digunakan dalam geografi untuk ....",
        options: ["Menghafal nama wilayah", "Menganalisis data spasial", "Mengukur massa batuan", "Menentukan umur fosil"],
        answer: 1
      }
    ];

    const app = document.getElementById("app");

    let currentUser = null;
    let attemptRef = null;
    let attemptData = null;
    let timerInterval = null;
    let isSubmitting = false;

    function escapeHTML(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatTime(seconds) {
      const safeSeconds = Math.max(0, seconds);
      const minutes = Math.floor(safeSeconds / 60);
      const secs = safeSeconds % 60;
      return `${String(minutes).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
    }

    function formatDuration(seconds) {
      const safeSeconds = Math.max(0, Number(seconds || 0));
      const minutes = Math.floor(safeSeconds / 60);
      const secs = safeSeconds % 60;
      return `${minutes}m ${String(secs).padStart(2, "0")}s`;
    }

    function getPublicName(user) {
      const email = user?.email || "";
      const name = email.split("@")[0] || "Peserta";

      return name
        .replace(/[._-]+/g, " ")
        .replace(/\b\w/g, char => char.toUpperCase())
        .slice(0, 32);
    }

    function redirectByRole(role) {
      if (role === "kebumian") {
        window.location.replace("/kebumian/");
        return;
      }

      if (role === "geografi") {
        window.location.replace("/geografi/");
        return;
      }

      window.location.replace("/login/");
    }

    function getStartedMillis(data) {
      if (typeof data?.startedAtMillis === "number") {
        return data.startedAtMillis;
      }

      if (data?.startedAt?.toDate) {
        return data.startedAt.toDate().getTime();
      }

      return Date.now();
    }

    function getRemainingSeconds() {
      const startedMillis = getStartedMillis(attemptData);
      const elapsed = Math.floor((Date.now() - startedMillis) / 1000);
      return DURATION_SECONDS - elapsed;
    }

    function leaderboardBoxHTML() {
      return `
        <div class="leaderboard-card">
          <div class="leaderboard-title">
            <h2>🏆 Leaderboard</h2>
          </div>

          <div id="leaderboardList" class="leaderboard-list">
            <div class="status success">Memuat leaderboard...</div>
          </div>
        </div>
      `;
    }

    async function saveLeaderboard(score, total, timeUsedSeconds) {
      const leaderboardRef = doc(db, "tryouts", TRYOUT_ID, "leaderboard", currentUser.uid);
      const percentage = total > 0 ? Math.round((score / total) * 100) : 0;

      await setDoc(leaderboardRef, {
        uid: currentUser.uid,
        displayName: getPublicName(currentUser),
        role: REQUIRED_ROLE,
        tryoutId: TRYOUT_ID,
        title: TRYOUT_TITLE,
        score,
        total,
        percentage,
        timeUsedSeconds,
        submittedAt: serverTimestamp(),
        submittedAtMillis: Date.now()
      }, { merge: true });
    }

    async function loadLeaderboard() {
      const leaderboardList = document.getElementById("leaderboardList");

      if (!leaderboardList) return;

      try {
        const leaderboardRef = collection(db, "tryouts", TRYOUT_ID, "leaderboard");
        const snapshot = await getDocs(leaderboardRef);

        const rows = [];

        snapshot.forEach((item) => {
          rows.push(item.data());
        });

        rows.sort((a, b) => {
          const scoreDiff = Number(b.score || 0) - Number(a.score || 0);
          if (scoreDiff !== 0) return scoreDiff;

          const timeDiff = Number(a.timeUsedSeconds || 999999) - Number(b.timeUsedSeconds || 999999);
          if (timeDiff !== 0) return timeDiff;

          return Number(a.submittedAtMillis || 0) - Number(b.submittedAtMillis || 0);
        });

        const topRows = rows.slice(0, 20);

        if (topRows.length === 0) {
          leaderboardList.innerHTML = `
            <div class="status error">Belum ada peserta yang masuk leaderboard.</div>
          `;
          return;
        }

        const rowHTML = topRows.map((row, index) => {
          const isMe = row.uid === currentUser?.uid;

          return `
            <div class="lb-row ${isMe ? "me" : ""}">
              <div class="lb-rank">#${index + 1}</div>
              <div class="lb-name">${escapeHTML(row.displayName || "Peserta")}${isMe ? " · Anda" : ""}</div>
              <div class="lb-score">${Number(row.score || 0)}/${Number(row.total || questions.length)}</div>
              <div class="lb-time">${formatDuration(row.timeUsedSeconds)}</div>
            </div>
          `;
        }).join("");

        leaderboardList.innerHTML = `
          <div class="lb-row lb-head">
            <div>Rank</div>
            <div>Nama</div>
            <div class="lb-score">Skor</div>
            <div class="lb-time">Waktu</div>
          </div>
          ${rowHTML}
        `;

      } catch (error) {
        console.error("Leaderboard error:", error);

        leaderboardList.innerHTML = `
          <div class="status error">Leaderboard gagal dimuat.</div>
        `;
      }
    }

    function renderIntro(user) {
      app.innerHTML = `
        <span class="badge">🎯 TryOut Geografi</span>
        <h1>${escapeHTML(TRYOUT_TITLE)}</h1>
        <p>
          Selamat datang, <strong>${escapeHTML(user.email || "Geomers")}</strong>.
          TryOut ini hanya dapat diikuti satu kali untuk setiap akun.
        </p>
        <p>
          Setelah menekan tombol mulai, sistem akan mencatat akun Anda sebagai peserta TryOut.
          Jika keluar sebelum submit, Anda masih dapat melanjutkan selama waktu masih tersedia.
        </p>

        <div class="info-grid">
          <div class="info">
            <strong>${questions.length}</strong>
            Soal
          </div>
          <div class="info">
            <strong>45</strong>
            Menit
          </div>
          <div class="info">
            <strong>1x</strong>
            Kesempatan
          </div>
          <div class="info">
            <strong>Auto</strong>
            Simpan
          </div>
        </div>

        <div id="statusBox"></div>

        <div class="actions">
          <button class="btn-primary" id="startBtn">Mulai TryOut</button>
          <a class="btn btn-outline" href="/geografi/">Kembali ke Geografi</a>
        </div>

        <div class="small-note">
          Catatan: gunakan koneksi internet yang stabil saat mengerjakan.
        </div>

        ${leaderboardBoxHTML()}
      `;

      document.getElementById("startBtn").addEventListener("click", startTryout);
      loadLeaderboard();
    }

    async function startTryout() {
      const startBtn = document.getElementById("startBtn");
      const statusBox = document.getElementById("statusBox");

      startBtn.disabled = true;
      startBtn.textContent = "Menyiapkan...";

      try {
        const startedAtMillis = Date.now();

        await runTransaction(db, async (transaction) => {
          const existing = await transaction.get(attemptRef);

          if (existing.exists()) {
            throw new Error("ALREADY_EXISTS");
          }

          transaction.set(attemptRef, {
            uid: currentUser.uid,
            email: currentUser.email || "",
            role: REQUIRED_ROLE,
            tryoutId: TRYOUT_ID,
            title: TRYOUT_TITLE,
            status: "started",
            total: questions.length,
            durationSeconds: DURATION_SECONDS,
            startedAt: serverTimestamp(),
            startedAtMillis
          });
        });

        const snap = await getDoc(attemptRef);
        attemptData = snap.data();

        renderQuestions();

      } catch (error) {
        if (error.message === "ALREADY_EXISTS") {
          const snap = await getDoc(attemptRef);
          attemptData = snap.data();

          if (attemptData?.status === "submitted") {
            renderLocked(attemptData);
          } else {
            renderQuestions();
          }

          return;
        }

        console.error("Start tryout error:", error);

        statusBox.innerHTML = `
          <div class="status error">
            TryOut gagal dimulai. Silakan refresh halaman atau coba lagi.
          </div>
        `;

        startBtn.disabled = false;
        startBtn.textContent = "Mulai TryOut";
      }
    }

    function renderQuestions() {
      const questionHTML = questions.map((q, index) => {
        const optionsHTML = q.options.map((option, optionIndex) => `
          <label class="option">
            <input type="radio" name="q${index}" value="${optionIndex}">
            <span>${escapeHTML(option)}</span>
          </label>
        `).join("");

        return `
          <div class="question">
            <h3>${index + 1}. ${escapeHTML(q.text)}</h3>
            ${optionsHTML}
          </div>
        `;
      }).join("");

      app.innerHTML = `
        <span class="badge">📝 Sedang Berlangsung</span>
        <h1>${escapeHTML(TRYOUT_TITLE)}</h1>
        <p>Pilih jawaban yang paling tepat. Setelah dikirim, hasil tidak dapat diubah.</p>

        <div class="timer-box">
          <div>
            <div class="timer-label">Sisa Waktu</div>
            <div class="timer-value" id="timerValue">--:--</div>
          </div>
          <div class="timer-label">
            Jangan tutup halaman sebelum jawaban dikirim.
          </div>
        </div>

        <form id="tryoutForm">
          ${questionHTML}

          <div id="statusBox"></div>

          <div class="actions">
            <button type="submit" class="btn-primary" id="submitBtn">Kirim Jawaban</button>
            <a class="btn btn-outline" href="/geografi/">Kembali</a>
          </div>
        </form>
      `;

      document.getElementById("tryoutForm").addEventListener("submit", function(event) {
        event.preventDefault();
        submitTryout(false);
      });

      startTimer();
    }

    function startTimer() {
      const timerValue = document.getElementById("timerValue");

      if (timerInterval) {
        clearInterval(timerInterval);
      }

      function updateTimer() {
        const remaining = getRemainingSeconds();

        if (timerValue) {
          timerValue.textContent = formatTime(remaining);
        }

        if (remaining <= 0) {
          clearInterval(timerInterval);
          submitTryout(true);
        }
      }

      updateTimer();
      timerInterval = setInterval(updateTimer, 1000);
    }

    function collectAnswers(requireComplete = true) {
      const answers = [];
      let score = 0;
      let unanswered = 0;

      for (let i = 0; i < questions.length; i++) {
        const selected = document.querySelector(`input[name="q${i}"]:checked`);

        if (!selected) {
          answers.push(null);
          unanswered++;
          continue;
        }

        const value = Number(selected.value);
        answers.push(value);

        if (value === questions[i].answer) {
          score++;
        }
      }

      if (requireComplete && unanswered > 0) {
        return {
          ok: false,
          unanswered,
          answers,
          score
        };
      }

      return {
        ok: true,
        unanswered,
        answers,
        score
      };
    }

    async function submitTryout(autoSubmit = false) {
      if (isSubmitting) return;

      const statusBox = document.getElementById("statusBox");
      const submitBtn = document.getElementById("submitBtn");

      const result = collectAnswers(!autoSubmit);

      if (!result.ok) {
        statusBox.innerHTML = `
          <div class="status error">
            Masih ada ${result.unanswered} soal yang belum dijawab.
          </div>
        `;
        return;
      }

      isSubmitting = true;

      if (submitBtn) {
        submitBtn.disabled = true;
        submitBtn.textContent = autoSubmit ? "Waktu habis, menyimpan..." : "Menyimpan...";
      }

      try {
        if (timerInterval) {
          clearInterval(timerInterval);
        }

        const startedMillis = getStartedMillis(attemptData);
        const timeUsedSeconds = Math.max(0, Math.floor((Date.now() - startedMillis) / 1000));

        await updateDoc(attemptRef, {
          status: "submitted",
          answers: result.answers,
          score: result.score,
          correctCount: result.score,
          total: questions.length,
          unanswered: result.unanswered,
          autoSubmitted: autoSubmit,
          timeUsedSeconds,
          submittedAt: serverTimestamp(),
          submittedAtMillis: Date.now()
        });

        await saveLeaderboard(result.score, questions.length, timeUsedSeconds);

        const snap = await getDoc(attemptRef);
        renderResult(snap.data());

      } catch (error) {
        console.error("Submit tryout error:", error);

        if (statusBox) {
          statusBox.innerHTML = `
            <div class="status error">
              Jawaban gagal disimpan. Silakan coba lagi.
            </div>
          `;
        }

        if (submitBtn) {
          submitBtn.disabled = false;
          submitBtn.textContent = "Kirim Jawaban";
        }

        isSubmitting = false;
      }
    }

    function renderResult(data) {
      const score = Number(data?.score || 0);
      const total = Number(data?.total || questions.length);
      const percent = total > 0 ? Math.round((score / total) * 100) : 0;

      app.innerHTML = `
        <span class="badge">✅ TryOut Selesai</span>
        <h1>Jawaban berhasil dikirim</h1>
        <p>
          Hasil TryOut Anda sudah tersimpan. Anda tidak dapat mengulang TryOut ini dengan akun yang sama.
        </p>

        <div class="score-box">
          <strong>${score}/${total}</strong>
          <div>Skor Akhir: ${percent}%</div>
        </div>

        ${leaderboardBoxHTML()}

        <div class="actions">
          <a class="btn btn-primary" href="/geografi/">Kembali ke Geografi</a>
        </div>
      `;

      loadLeaderboard();
    }

    function renderLocked(data) {
      const scoreAvailable = typeof data?.score === "number";
      const score = scoreAvailable ? Number(data.score) : 0;
      const total = Number(data?.total || questions.length);
      const percent = scoreAvailable && total > 0 ? Math.round((score / total) * 100) : null;

      app.innerHTML = `
        <span class="badge">🔒 TryOut Terkunci</span>
        <h1>Akun ini sudah mengikuti TryOut</h1>
        <p>
          Satu akun hanya dapat mengikuti TryOut ini sebanyak satu kali.
          Data pengerjaan Anda sudah tercatat di sistem.
        </p>

        ${
          scoreAvailable
            ? `
              <div class="score-box">
                <strong>${score}/${total}</strong>
                <div>Skor Akhir: ${percent}%</div>
              </div>
            `
            : `
              <div class="status error">
                Anda sudah pernah memulai TryOut ini, tetapi belum ada skor akhir yang tersimpan.
              </div>
            `
        }

        ${leaderboardBoxHTML()}

        <div class="actions">
          <a class="btn btn-primary" href="/geografi/">Kembali ke Geografi</a>
        </div>
      `;

      loadLeaderboard();
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.replace("/login/");
        return;
      }

      try {
        currentUser = user;

        const token = await user.getIdTokenResult(true);
        const role = token.claims.role;

        if (role !== REQUIRED_ROLE) {
          redirectByRole(role);
          return;
        }

        attemptRef = doc(db, "tryouts", TRYOUT_ID, "attempts", user.uid);

        const attemptSnap = await getDoc(attemptRef);

        if (!attemptSnap.exists()) {
          renderIntro(user);
          return;
        }

        attemptData = attemptSnap.data();

        if (attemptData.status === "submitted") {
          renderLocked(attemptData);
          return;
        }

        renderQuestions();

      } catch (error) {
        console.error("TryOut auth error:", error);

        app.innerHTML = `
          <span class="badge">⚠️ Gagal Memuat</span>
          <h1>TryOut tidak dapat dibuka</h1>
          <p>Terjadi kendala saat memeriksa akun Anda. Silakan login ulang.</p>

          <div class="actions">
            <a class="btn btn-primary" href="/login/">Ke Halaman Login</a>
          </div>
        `;
      }
    });
  </script>
</body>
</html>
